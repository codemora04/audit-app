<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Système d'Audit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f172a">
</head>
<script src="./pwa.js"></script>
<body>

<div class="container">
  <h1>Système d'Audit</h1>
    <!-- ===== USERNAME ===== -->
  <div class="user-box">
    <p><b>NOTE :</b> Entrez le nom sous cet ordre : <b>nom prénom</b></p>

    <input type="text" id="username" placeholder="Ex: benali sara" autocomplete="off">
    <button id="validateUserBtn" class="btn-retour" type="button">Valider</button>

    <p id="errorMessage" class="error"></p>
    <p id="successMessage" class="success"></p>
  </div>


  <div class="logos">
    <button class="logo-btn" id="baltimarBtn" disabled>
      <img src="logo1.png" width="100" alt="Baltimar">
    </button>

    <button class="logo-btn" id="reveyBtn" disabled>
      <img src="logo2.png" width="100" alt="Revey">
    </button>
  </div>

  <div class="btn-container">
    <button class="btn-retour" id="logoutBtn">Déconnexion</button>
  </div>
</div>

<script type="module">
  import { supabase } from "./supabase.js";

  // ===== CHECK SESSION =====
  const { data: sessionData } = await supabase.auth.getSession();
  if (!sessionData.session) window.location.href = "login.html";

  // ===== DOM =====
  const usernameInput = document.getElementById("username");
  const validateUserBtn = document.getElementById("validateUserBtn");
  const errorMessage = document.getElementById("errorMessage");
  const successMessage = document.getElementById("successMessage");

  const baltimarBtn = document.getElementById("baltimarBtn");
  const reveyBtn = document.getElementById("reveyBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  function setError(msg) {
    errorMessage.textContent = msg || "";
    successMessage.textContent = "";
  }

  function setSuccess(msg) {
    successMessage.textContent = msg || "";
    errorMessage.textContent = "";
  }

  function enableLogos() {
    baltimarBtn.disabled = false;
    reveyBtn.disabled = false;
  }

  function disableLogos() {
    baltimarBtn.disabled = true;
    reveyBtn.disabled = true;
  }

  const savedUsername = sessionStorage.getItem("audit_username");
  if (savedUsername) {
    usernameInput.value = savedUsername;
    enableLogos();
    setSuccess("Bienvenue " + savedUsername + " !");
  } else {
    disableLogos();
  }

  // ===== Validate username with Supabase table =====
validateUserBtn.addEventListener("click", async () => {

  const username = usernameInput.value.trim().toLowerCase();

  if (!username) {
    setError("Veuillez entrer votre nom utilisateur.");
    disableLogos();
    return;
  }

  if (username.split(/\s+/).length < 2) {
    setError("Respectez l'ordre : nom prénom.");
    disableLogos();
    return;
  }

  // ✅ AJOUTER CETTE LIGNE ICI
  localStorage.setItem("username", username);

  const { data, error } = await supabase
    .from("authorized_users")
    .select("username")
    .eq("username", username)
    .maybeSingle();

  if (error || !data) {
    setError("Nom utilisateur invalide.");
    disableLogos();
    return;
  }

  sessionStorage.setItem("audit_username", username);
  enableLogos();
    setSuccess("Bienvenue " + username + " ! Choisissez Baltimar ou Revey.");
  });

  // ===== Go to pages =====
  baltimarBtn.addEventListener("click", () => {
    window.location.href = "baltimar.html";
  });

  reveyBtn.addEventListener("click", () => {
    window.location.href = "revey.html";
  });

  // ===== Logout =====
  logoutBtn.addEventListener("click", async () => {
    sessionStorage.removeItem("audit_username");
    await supabase.auth.signOut();
    window.location.href = "login.html";
  });
</script>

</body>
</html>
