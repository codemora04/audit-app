<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revey</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
  <div class="container">
    <!-- Logo -->
    <img
      src="logo2.png"
      alt="Logo Revey"
      class="logo"
      width="150"
      height="90"
    />
    <br /><br />

    <!-- Étape 1 : Choisir un atelier -->
    <label for="atelier">Atelier :</label>
    <select id="atelier">
      <option value="">--Choisir--</option>
    </select>

    <!-- Étape 2 : Type d'audit -->
    <div id="audit-container" class="hidden">
      <label for="audit">Type d'audit :</label>
      <select id="audit">
        <option value="">--Choisir--</option>
      </select>
    </div>

    <!-- Étape 3 : Zone -->
    <div id="zone-container" class="hidden">
      <label for="zone">Zone :</label>
      <select id="zone">
        <option value="">--Choisir--</option>
      </select>
    </div>

    <!-- Étape 4 : Rubriques -->
    <div id="rubrique-container" class="hidden">
      <h3>Rubriques :</h3>
      <div id="rubriques-list" class="accordion"></div>
    </div>

    <!-- Boutons PDF -->
    <button id="downloadPdf" class="btn-pdf hidden">Télécharger PDF</button>
  <!--<button id="downloadScoreBtn" class="btn-pdf hidden">Télécharger Score</button>-->

    <div class="btn-container">
      <a href="accueil.html" class="btn-retour-rouge">← Retour à l'accueil</a>
    </div>
  </div>

  <!-- PWA (si tu l'utilises) -->
  <script src="./pwa.js"></script>

  <!-- Ton JS -->
  <script type="module" src="revey.js"></script>
</body>
</html>
